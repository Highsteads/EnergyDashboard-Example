        .s4 { grid-column: span 4; } .s5 { grid-column: span 5; }
        .s6 { grid-column: span 6; } .s7 { grid-column: span 7; }

        .eco-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }

               border-radius: 10px; padding: 12px; text-align: center; }
        .eco .nm { font-size: 10px; color: var(--text-secondary); margin-bottom: 6px; }
        .eco .l { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
        .eco .ring { position: relative; width: 50px; height: 50px; margin: 0 auto 4px; }
        .eco .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .eco .ring .pct { position: absolute; top: 0; left: 0; right: 0; bottom: 0;

                          font-size: 13px; font-weight: 700; }
        .sec-list { display: flex; flex-direction: column; gap: 4px; max-height: 220px; overflow-y: auto; }
        .sec-item { display: flex; justify-content: space-between; padding: 6px 10px;

                    border-radius: 4px; font-size: 12px; }
        .sec-item.motion { background: rgba(255,149,0,0.08); border-left-color: var(--warn); }
        .opt-status {

            border: 1px solid var(--border); border-radius: 10px; padding: 12px;

        .opt-action { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .opt-reason { font-size: 11px; color: var(--text-secondary); white-space: pre-line; line-height: 1.5; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 999px;

        .chart-wrap { position: relative; height: 200px; }
        .chart-wrap.tall { height: 260px; }
        .chart-wrap.short { height: 140px; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); }

            .s2,.s3,.s4,.s5,.s6,.s7,.s8 { grid-column: span 12; }

        }
    </style>

<!-- ── Inlined IndigoAPI (V1) — credit @simons-plugins/indigo-claude-plugin ── -->
<script>
class IndigoAPIError extends Error {
    constructor(msg, status) { super(msg); this.name = "IndigoAPIError"; this.status = status; }
}
class IndigoAPI {
    constructor(config) {
        const c = config || window.INDIGO_CONFIG || IndigoAPI.getStoredConfig();
        if (!c) throw new IndigoAPIError("Not configured", 0);
        this._base = c.baseURL.replace(/\/+$/, "");
        this._key = c.apiKey;
        this._authH = [];
    }
    static isConfigured() {
        const c = window.INDIGO_CONFIG || IndigoAPI.getStoredConfig();
        return !!(c && c.baseURL && c.apiKey);
    }
    static getStoredConfig() {
        try { return JSON.parse(localStorage.getItem("indigo_config") || "null"); } catch { return null; }
    }
    static clearConfig() { localStorage.removeItem("indigo_config"); }
    static storeConfig(c) { localStorage.setItem("indigo_config", JSON.stringify(c)); }
    onAuthFailure(fn) { this._authH.push(fn); }
    async _fetch(path, opts = {}) {
        const headers = { Authorization: "Bearer " + this._key, Accept: "application/json", ...(opts.headers || {}) };
        const r = await fetch(this._base + path, { ...opts, headers });
        if (r.status === 401 || r.status === 403) {
            this._authH.forEach(h => h()); throw new IndigoAPIError("Auth failed", r.status);
        }
        if (!r.ok) throw new IndigoAPIError("HTTP " + r.status, r.status);
        const ct = r.headers.get("Content-Type") || "";
        return ct.includes("json") ? r.json() : null;
    }
    getDevices() { return this._fetch("/v2/api/indigo.devices"); }
    getVariables() { return this._fetch("/v2/api/indigo.variables"); }
    setHeatSetpoint(id, value) {
        return this._fetch("/v2/api/command", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: "indigo.thermostat.setHeatSetpoint", objectId: id, parameters: { value: value } })
        });
    }
    observeAll(cb, ms = 5000) {
        let last = "";
        const tick = async () => {
            try {
                const [devices, variables] = await Promise.all([ this.getDevices(), this.getVariables() ]);
                const j = JSON.stringify({d:devices.length, v:variables.length, ts: devices.map(x=>x.id+":"+(x.states?JSON.stringify(x.states):"")+":"+x.onState).join("|")});
                if (j !== last) { last = j; cb({devices, variables}); }
            } catch (e) { console.warn("Poll error:", e.message); }
        };
        tick();
        const t = setInterval(tick, ms);
        return { stop: () => clearInterval(t) };
    }
}
</script>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// ⚙️  CONFIG — EDIT THIS BLOCK TO MATCH YOUR OWN INDIGO SETUP
// ═════════════════════════════════════════════════════════════════════════════
// To find a device ID: in the Indigo client, right-click → Copy ID.
// Every section is OPTIONAL — leave a deviceId as null and that section will
// either hide itself or fall back to auto-discovery. See docs/customising.md
// for examples mapped to different plugins (Sigenergy, Solis, Enphase, Shelly EM…).
// ═════════════════════════════════════════════════════════════════════════════

// ── ENERGY: solar / battery / grid / home ────────────────────────────────────
// Any inverter or energy-monitor device that publishes these states works here.
// The defaults below match the SigenEnergyManager plugin's state names — if you
// use a different plugin, set deviceId and edit the state keys to match.
// Set deviceId to null to hide the whole energy section.
const ENERGY = {
    deviceId: null,                     // ← your inverter / energy device ID
    states: {
        solar_power_w:    "pvPowerWatts",
        solar_kwh:        "pvDailyKwh",
        battery_soc:      "batterySoc",
        battery_power_w:  "batteryPowerWatts",   // +ve = charging, -ve = discharging
        battery_charge_kwh:    "batteryDailyChargeKwh",
        battery_discharge_kwh: "batteryDailyDischargeKwh",
        battery_soh:      "batterySoh",
        battery_temp_c:   "batteryTempC",
        battery_cell_v:   "batteryCellVoltage",
        battery_temp_min: "batteryMinTempC",
        battery_temp_max: "batteryMaxTempC",
        grid_power_w:     "gridPowerWatts",      // +ve = importing, -ve = exporting
        grid_import_kwh:  "gridDailyImportKwh",
        grid_export_kwh:  "gridDailyExportKwh",
        home_power_w:     "homePowerWatts",
        home_kwh:         "homeDailyKwh",
    },
    battery_capacity_kwh: 10,           // total usable battery capacity
};

// ── OPTIMISER (optional): a separate "manager" device that publishes an action
// and reasoning string. Hides if deviceId is null.
const OPTIMISER = {
    deviceId: null,
    states: {
        manager_status:    "managerStatus",
        current_action:    "currentAction",
        current_reason:    "currentReason",
        tariff_active:     "tariffActive",
        dawn_viable:       "dawnViable",
        rate_today:        "rateToday",
        rate_tomorrow:     "rateTomorrow",
        tomorrow_solar:    "tomorrowSolarKwh",
        tomorrow_need:     "tomorrowNeedKwh",
        last_update:       "lastUpdate",
    },
};

// ── HEATING: thermostat zones ────────────────────────────────────────────────
// Auto-discover finds every device whose class contains "Thermostat" — works
// with Insteon, Z-Wave, Nest, Ecobee, EvoHome, RAMSES, generic Indigo thermostats.
// Set to a list of [id, "Display Name"] pairs if you want manual control.
const HEATING = {
    auto_discover: true,
    devices: null,                      // e.g. [[123456, "Lounge"], [789012, "Kitchen"]]
};

// ── BACKUP BATTERIES: portable power stations, UPS, anything with an SOC ─────
// Auto-discover finds any device with a numeric batteryLevel or soc state > 0.
const BACKUP_BATTERIES = {
    auto_discover: true,
    devices: null,                      // e.g. [[111222, "Garage UPS"], ...]
};

// ── VARIABLES: Indigo variables holding tariff & gas data ────────────────────
// All optional — missing variables show as zero. Adjust names to match whatever
// your Octopus / tariff integration writes.
const VARIABLES = {
    gas_today_kwh:           "gas_today_kwh",
    gas_yesterday_kwh:       "gas_yesterday_kwh",
    gas_month_kwh:           "gas_month_kwh",
    gas_unit_rate_p:         "gas_unit_rate_p",
    elec_unit_rate_p:        "elec_unit_rate_p",
    export_rate_p:           "export_rate_p",
    export_month_kwh:        "export_month_kwh",
    export_month_revenue:    "export_month_revenue_gbp",
    export_yesterday_kwh:    "export_yesterday_kwh",
    yesterday_pv_kwh:        "sigen_today_pv_kwh",       // yesterday's PV total
    yesterday_home_kwh:      "sigen_today_home_kwh",     // yesterday's home consumption
    yesterday_import_kwh:    "sigen_today_import_kwh",   // yesterday's import
    optimiser_plan:          "battery_optimiser_status", // free-text overnight plan
};

// ── Polling interval (ms) — 5s is a sensible default ──
const POLL_INTERVAL_MS = 5000;

// ═════════════════════════════════════════════════════════════════════════════
// END CONFIG — everything below this line is generic and shouldn't need editing
// ═════════════════════════════════════════════════════════════════════════════

// ── Polling status ──
let _lastUpdate = 0;
function _pad(n) { return String(n).padStart(2, "0"); }
function markRefreshed() { _lastUpdate = Date.now(); tickRefreshStatus(); }
function tickRefreshStatus() {
    let tsStr = "—";
    if (_lastUpdate) {
        const d = new Date(_lastUpdate);
        tsStr = _pad(d.getHours()) + ":" + _pad(d.getMinutes()) + ":" + _pad(d.getSeconds());
    }
    const elapsed = _lastUpdate ? (Date.now() - _lastUpdate) / 1000 : 0;
    const cdwn = Math.max(0, Math.round((POLL_INTERVAL_MS / 1000) - elapsed));
    const tsEl = document.getElementById("ts"); if (tsEl) tsEl.textContent = tsStr;
    const cdEl = document.getElementById("cdwn"); if (cdEl) cdEl.textContent = cdwn;
}
setInterval(markRefreshed, POLL_INTERVAL_MS);
setInterval(tickRefreshStatus, 1000);

// ── Bootstrap ──
if (window.INDIGO_CONFIG_MISSING || !IndigoAPI.isConfigured()) {
    showConnectForm();
} else {
    buildLayout();
    const indigo = new IndigoAPI();
    indigo.onAuthFailure(() => {
        IndigoAPI.clearConfig();
        showConnectForm();
    });
    indigo.observeAll(payload => { markRefreshed(); render(payload); }, POLL_INTERVAL_MS);
    window._indigo = indigo;
}

function showConnectForm() {
    document.getElementById("app").innerHTML = `
        <div class="card" style="max-width:420px;margin:60px auto;">
            <h3 style="margin-bottom:12px;">Connect to Indigo</h3>
            <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;">
                Enter your Indigo server URL and API key. Stored in browser localStorage only.
            </p>
            <label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:4px;">Server URL</label>
            <input id="cfg-url" type="url" placeholder="https://192.168.1.x:8176"
                style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);">
            <label style="display:block;font-size:13px;color:var(--text-secondary);margin:12px 0 4px;">API Key</label>
            <input id="cfg-key" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
                style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);">
            <button onclick="saveConfig()"
                style="margin-top:16px;width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:white;font-size:15px;font-weight:600;cursor:pointer;min-height:44px;">
                Connect
            </button>
        </div>
    `;
}

function saveConfig() {
    const baseURL = document.getElementById("cfg-url").value.replace(/\/+$/, "");
    const apiKey = document.getElementById("cfg-key").value.trim();
    if (!baseURL || !apiKey) return;
    IndigoAPI.storeConfig({ baseURL, apiKey });
    location.reload();
}

            <div class="card s3"><h3>Home source — polar</h3><div class="chart-wrap"><canvas id="mixPolar"></canvas></div></div>

            <div class="card s6"><h3>Today vs yesterday — grouped</h3><div class="chart-wrap"><canvas id="todayVsYesterday"></canvas></div></div>
        </div>

        <h2 class="section">💷 Tariffs &amp; Forecast</h2>
        <div class="grid">
            <div class="card s8">
                <h3>Octopus tariffs — live</h3>
                <div class="tariff-row" id="tariffRow"></div>

        <h2 class="section">🛡 Security</h2>

            All data live via Indigo REST API · Polling every ${POLL_INTERVAL_MS/1000}s ·

}

// ── Chart instances (created lazily, updated in place) ──
const charts = {};
function makeChart(id, type, data, options) {
    const ctx = document.getElementById(id);
    if (!ctx) return null;
    if (charts[id]) {
        charts[id].data = data;
        if (options) charts[id].options = options;
        charts[id].update("none");
        return charts[id];
    }
    Chart.defaults.color = getComputedStyle(document.body).getPropertyValue('--text-secondary').trim() || '#86868b';
    Chart.defaults.borderColor = getComputedStyle(document.body).getPropertyValue('--border').trim() || '#d2d2d7';
    Chart.defaults.font.family = '-apple-system, "SF Pro Text", Inter, system-ui, sans-serif';
    charts[id] = new Chart(ctx, { type, data, options });
    return charts[id];
}

// ── Render: called on every poll cycle ──
function render({devices, variables}) {
    const byId = {};
    devices.forEach(d => byId[d.id] = d);
    const varByName = {};
    variables.forEach(v => varByName[v.name] = v.value);

    // ── Generic helpers — pull state values by ROLE not by hardcoded name ──
    const num = (v, d = 0) => { const n = parseFloat(v); return isNaN(n) ? d : n; };
    const txt = v => v === null || v === undefined ? "" : String(v);
    const getEnergyState = (role) => {
        if (!ENERGY.deviceId) return undefined;
        const dev = byId[ENERGY.deviceId];
        const stateName = ENERGY.states[role];
        return dev && dev.states ? dev.states[stateName] : undefined;
    };
    const getOptimiserState = (role) => {
        if (!OPTIMISER.deviceId) return undefined;
        const dev = byId[OPTIMISER.deviceId];
        const stateName = OPTIMISER.states[role];
        return dev && dev.states ? dev.states[stateName] : undefined;
    };
    const getVar = (role) => varByName[VARIABLES[role]];

    // ── Hero KPIs (read via role, not by hardcoded state names) ──
    const pvNow = num(getEnergyState("solar_power_w"));
    const pvKwh = num(getEnergyState("solar_kwh"));
    const soc = num(getEnergyState("battery_soc"));
    const battKwh = +(soc * ENERGY.battery_capacity_kwh / 100).toFixed(1);
    const battPower = num(getEnergyState("battery_power_w"));
    const grid = num(getEnergyState("grid_power_w"));
    const exporting = grid < 0;
    const homeNow = num(getEnergyState("home_power_w"));
    const homeKwh = num(getEnergyState("home_kwh"));
    const exportKwh = num(getEnergyState("grid_export_kwh"));
    const importKwh = num(getEnergyState("grid_import_kwh"));
    const gasToday = num(getVar("gas_today_kwh"));
    const gasMonth = num(getVar("gas_month_kwh"));
    const exportRev = num(getVar("export_month_revenue"));
    const exportMonthKwh = num(getVar("export_month_kwh"));

    document.getElementById("hero").innerHTML = `
        <div class="card"><div class="kpi"><div class="icon" style="color:var(--solar)">☀</div><div class="v" style="color:var(--solar)">${(pvNow/1000).toFixed(2)} kW</div><div class="l">Solar now</div><div class="delta">${pvKwh.toFixed(2)} kWh today</div></div></div>
        <div class="card"><div class="kpi"><div class="icon" style="color:var(--battery)">🔋</div><div class="v" style="color:var(--battery)">${soc.toFixed(1)}%</div><div class="l">Battery · ${battKwh} kWh</div><div class="delta">${battPower > 0 ? "Charging" : "Discharging"} ${Math.abs(battPower)} W</div></div></div>
        <div class="card"><div class="kpi"><div class="icon" style="color:${exporting ? 'var(--grid-out)' : 'var(--grid-in)'}">⇄</div><div class="v" style="color:${exporting ? 'var(--grid-out)' : 'var(--grid-in)'}">${(Math.abs(grid)/1000).toFixed(2)} kW</div><div class="l">${exporting ? "Exporting" : "Importing"}</div><div class="delta">${exportKwh.toFixed(2)} exp · ${importKwh.toFixed(2)} imp kWh</div></div></div>
        <div class="card"><div class="kpi"><div class="icon" style="color:var(--home)">⌂</div><div class="v" style="color:var(--home)">${homeNow} W</div><div class="l">Home draw</div><div class="delta">${homeKwh.toFixed(2)} kWh today</div></div></div>
        <div class="card"><div class="kpi"><div class="icon" style="color:var(--gas)">🔥</div><div class="v" style="color:var(--gas)">${gasToday.toFixed(1)} kWh</div><div class="l">Gas today</div><div class="delta">${gasMonth.toFixed(1)} kWh month</div></div></div>
        <div class="card"><div class="kpi"><div class="icon" style="color:var(--good)">£</div><div class="v" style="color:var(--good)">£${exportRev.toFixed(2)}</div><div class="l">Export revenue</div><div class="delta">${exportMonthKwh.toFixed(1)} kWh month</div></div></div>
    `;

    // ── Flow diagram ──
    const flowPipe = (active, cls) => active ? `pipe ${cls}` : `pipe ${cls} off`;
    document.getElementById("flowDiagram").innerHTML = `
        <svg viewBox="0 0 700 280" preserveAspectRatio="xMidYMid meet">
            <path class="${flowPipe(pvNow > 50, 'solar')}" style="stroke:var(--solar)" d="M 110 70 Q 200 70 350 140"/>
            <path class="${flowPipe(Math.abs(battPower) > 50, 'battery')}" style="stroke:var(--battery)" d="M 350 140 Q 200 200 110 220"/>
            <path class="${flowPipe(homeNow > 50, 'home')}" style="stroke:var(--home)" d="M 350 140 Q 470 110 590 70"/>
            <path class="${flowPipe(Math.abs(grid) > 50, exporting ? 'gridOut' : 'gridIn')}" style="stroke:${exporting ? 'var(--grid-out)' : 'var(--grid-in)'}" d="M 350 140 Q 470 200 590 220"/>
            <g class="flow-node">
                <circle cx="110" cy="70" r="42" fill="var(--card-bg)" stroke="var(--solar)"/>
                <text x="110" y="64" font-size="16">${(pvNow/1000).toFixed(1)}</text>
                <text x="110" y="82" class="lbl">kW Solar</text>
            </g>
            <g class="flow-node">
                <circle cx="110" cy="220" r="42" fill="var(--card-bg)" stroke="var(--battery)"/>
                <text x="110" y="214" font-size="16">${soc.toFixed(0)}%</text>
                <text x="110" y="232" class="lbl">Battery</text>
            </g>
            <g class="flow-node">
                <circle cx="590" cy="70" r="42" fill="var(--card-bg)" stroke="var(--home)"/>
                <text x="590" y="64" font-size="16">${homeNow}</text>
                <text x="590" y="82" class="lbl">W Home</text>
            </g>
            <g class="flow-node">
                <circle cx="590" cy="220" r="42" fill="var(--card-bg)" stroke="${exporting ? 'var(--grid-out)' : 'var(--grid-in)'}"/>
                <text x="590" y="214" font-size="16">${(Math.abs(grid)/1000).toFixed(1)}</text>
                <text x="590" y="232" class="lbl">kW ${exporting ? 'Export' : 'Import'}</text>
            </g>
            <circle cx="350" cy="140" r="6" fill="var(--accent)"/>
        </svg>
    `;

    // ── SOC gauge ──
    const circumference = 502.4;
    const socOffset = circumference * (1 - soc / 100);
    document.getElementById("socGauge").innerHTML = `
        <svg class="soc-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="80" class="soc-bg"/>
            <circle cx="100" cy="100" r="80" class="soc-fg" stroke-dasharray="${circumference}" stroke-dashoffset="${socOffset}"/>
        </svg>
        <div class="soc-center"><div class="v">${soc.toFixed(1)}%</div><div class="l">${battKwh} / ${ENERGY.battery_capacity_kwh} kWh</div></div>
    `;

    document.getElementById("batteryHealth").innerHTML = `
        <div style="margin-top:6px;">
            <div style="font-size:10px;color:var(--text-secondary);">State of health</div>
            <div style="font-size:22px;font-weight:700;color:var(--good);">${num(getEnergyState("battery_soh")).toFixed(0)}%</div>
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--text-secondary);line-height:1.7;">
            Cell V: <b style="color:var(--text)">${txt(getEnergyState("battery_cell_v"))}</b><br>
            Temp: <b style="color:var(--text)">${txt(getEnergyState("battery_temp_c"))}°C</b><br>
            Range: <b style="color:var(--text)">${txt(getEnergyState("battery_temp_min"))}–${txt(getEnergyState("battery_temp_max"))}</b>
        </div>
    `;

    // ── Today's bars + mix charts ──
    const battChg = num(getEnergyState("battery_charge_kwh"));
    const battDis = num(getEnergyState("battery_discharge_kwh"));
    makeChart("todayBars", "bar", {
        labels: ["Solar generated", "Home used", "Battery charged", "Battery discharged", "Grid imported", "Grid exported", "Gas"],
        datasets: [{ data: [pvKwh, homeKwh, battChg, battDis, importKwh, exportKwh, gasToday],
            backgroundColor: ["#ff9500","#af52de","#007aff","#007aff","#ff3b30","#34c759","#ff9500"], borderRadius: 6 }]
    }, { indexAxis: "y", plugins: { legend: { display: false } },
        scales: { x: { ticks: { callback: v => v + " kWh" } } }, responsive: true, maintainAspectRatio: false });

    const homeFromSolar = Math.max(0, +(homeKwh - importKwh - battDis).toFixed(2));
    const cardBg = getComputedStyle(document.body).getPropertyValue('--card-bg').trim();
    makeChart("mixDonut", "doughnut", {
        labels: ["Solar direct", "Battery (stored solar)", "Grid import"],
        datasets: [{ data: [homeFromSolar, battDis, importKwh], backgroundColor: ["#ff9500","#007aff","#ff3b30"], borderColor: cardBg, borderWidth: 3 }]
    }, { cutout: "60%", plugins: { legend: { position: "bottom", labels: { font: { size: 10 }, boxWidth: 10 } } }, responsive: true, maintainAspectRatio: false });
    makeChart("mixPolar", "polarArea", {
        labels: ["Solar direct", "Battery", "Grid"],
        datasets: [{ data: [homeFromSolar, battDis, importKwh], backgroundColor: ["rgba(255,149,0,0.6)","rgba(0,122,255,0.6)","rgba(255,59,48,0.6)"] }]
    }, { plugins: { legend: { position: "bottom", labels: { font: { size: 10 }, boxWidth: 10 } } }, scales: { r: { ticks: { display: false } } }, responsive: true, maintainAspectRatio: false });
    makeChart("stackedFlow", "bar", {
        labels: [`Solar ${pvKwh.toFixed(2)} kWh today`],
        datasets: [
            { label: "Direct to home", data: [homeFromSolar], backgroundColor: "#af52de", stack: "s", borderRadius: 4 },
            { label: "To battery", data: [battChg], backgroundColor: "#007aff", stack: "s", borderRadius: 4 },
            { label: "Exported", data: [exportKwh], backgroundColor: "#34c759", stack: "s", borderRadius: 4 },
        ]
    }, { indexAxis: "y", plugins: { legend: { labels: { font: { size: 10 } } } },
        scales: { x: { stacked: true, ticks: { callback: v => v + " kWh" } }, y: { stacked: true } }, responsive: true, maintainAspectRatio: false });

    const yPv = num(getVar("yesterday_pv_kwh"));
    const yExp = num(getVar("export_yesterday_kwh"));
    const yHome = num(getVar("yesterday_home_kwh"));
    const yImp = num(getVar("yesterday_import_kwh"));
    makeChart("todayVsYesterday", "bar", {
        labels: ["PV","Home","Import","Export"],
        datasets: [
            { label: "Yesterday", data: [yPv, yHome, yImp, yExp], backgroundColor: "rgba(134,134,139,0.5)", borderRadius: 6 },
            { label: "Today (so far)", data: [pvKwh, homeKwh, importKwh, exportKwh], backgroundColor: "#ff9500", borderRadius: 6 },
        ]
    }, { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { y: { ticks: { callback: v => v + " kWh" } } }, responsive: true, maintainAspectRatio: false });

    // ── Tariffs ──
    const trackToday = num(getOptimiserState("rate_today"));
    const trackTomorrow = num(getOptimiserState("rate_tomorrow"));
    const exportRate = num(getVar("export_rate_p"), 0);
    const gasRate = num(getVar("gas_unit_rate_p"), 0);
    const legacyRate = num(getVar("elec_unit_rate_p"));

    document.getElementById("tariffRow").innerHTML = `
        <div class="tariff-pill"><div class="lbl">Import today</div><div class="p" style="color:var(--warn)">${trackToday.toFixed(2)}<span style="font-size:11px">p</span></div></div>
        <div class="tariff-pill"><div class="lbl">Import tomorrow</div><div class="p" style="color:var(--warn)">${trackTomorrow.toFixed(2)}<span style="font-size:11px">p</span></div></div>
        <div class="tariff-pill"><div class="lbl">Export</div><div class="p" style="color:var(--good)">${exportRate.toFixed(2)}<span style="font-size:11px">p</span></div></div>
        <div class="tariff-pill"><div class="lbl">Gas unit</div><div class="p" style="color:var(--gas)">${gasRate.toFixed(2)}<span style="font-size:11px">p</span></div></div>
    `;
    makeChart("tariffRadar", "radar", {
        labels: ["Import today","Import tomorrow","Export","Gas","Legacy"],
        datasets: [{ label: "p/kWh", data: [trackToday, trackTomorrow, exportRate, gasRate, legacyRate], backgroundColor: "rgba(255,149,0,0.25)", borderColor: "#ff9500", pointBackgroundColor: "#ff9500", borderWidth: 2 }]
    }, { plugins: { legend: { labels: { font: { size: 10 } } } }, scales: { r: { suggestedMin: 0, suggestedMax: 25, pointLabels: { font: { size: 10 } }, ticks: { backdropColor: 'transparent', font: { size: 9 } } } }, responsive: true, maintainAspectRatio: false });

    // ── Forecast ──
    const tomorrowSolar = num(getOptimiserState("tomorrow_solar"));
    const tomorrowNeed = num(getOptimiserState("tomorrow_need"));
    const surplus = +(tomorrowSolar - tomorrowNeed).toFixed(1);
    document.getElementById("forecastRow").innerHTML = `
        <div class="forecast-card"><div class="v" style="color:var(--solar)">${tomorrowSolar.toFixed(1)}</div><div class="l">kWh forecast</div></div>
        <div class="forecast-card"><div class="v" style="color:var(--home)">${tomorrowNeed.toFixed(1)}</div><div class="l">kWh home need</div></div>
        <div class="forecast-card"><div class="v" style="color:var(--good)">${surplus.toFixed(1)}</div><div class="l">kWh surplus</div></div>
    `;
    makeChart("forecastDonut", "doughnut", {
        labels: ["Home need", "Surplus → battery + export"],
        datasets: [{ data: [tomorrowNeed, Math.max(0, surplus)], backgroundColor: ["#af52de","#34c759"], borderColor: cardBg, borderWidth: 3 }]
    }, { cutout: "65%", plugins: { legend: { position: "bottom", labels: { font: { size: 10 }, boxWidth: 10 } } }, responsive: true, maintainAspectRatio: false });

    // ── Backup batteries (auto-discover or manual list) ──
    // Auto-discover: any device with a numeric batteryLevel/soc state > 0 that
    // isn't already the main energy device (which has its own SOC card above).
    let batteryDevices;
    if (BACKUP_BATTERIES.devices && BACKUP_BATTERIES.devices.length) {
        batteryDevices = BACKUP_BATTERIES.devices.map(([id, name]) => ({device: byId[id], name}));
    } else if (BACKUP_BATTERIES.auto_discover) {
        batteryDevices = devices
            .filter(d => d.id !== ENERGY.deviceId)
            .map(d => {
                const lvl = num(d.batteryLevel ?? (d.states && (d.states.batteryLevel || d.states.soc || d.states.batterySoc)));
                return lvl > 0 ? {device: d, name: d.name, level: lvl} : null;
            })
            .filter(Boolean);
    } else {
        batteryDevices = [];
    }
    document.getElementById("ecoRow").innerHTML = batteryDevices.length === 0
        ? `<div style="text-align:center;padding:30px;color:var(--text-secondary);">No backup batteries discovered. Set <code>BACKUP_BATTERIES.devices</code> or check that devices report a <code>batteryLevel</code> state.</div>`
        : batteryDevices.map(({device, name, level}) => {
            const soc = level !== undefined ? level : num(device && (device.batteryLevel ?? (device.states && (device.states.batteryLevel || device.states.soc))));
            const dash = 157;
            const offset = dash * (1 - soc/100);
            return `<div class="eco">
                <div class="nm">${escapeHtml(name)}</div>
                <div class="ring">
                    <svg viewBox="0 0 60 60">
                        <circle cx="30" cy="30" r="25" fill="none" stroke="var(--off-color)" stroke-width="6"/>
                        <circle cx="30" cy="30" r="25" fill="none" stroke="var(--battery)" stroke-width="6" stroke-dasharray="${dash}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
                    </svg>
                    <div class="pct">${soc.toFixed(0)}%</div>
                </div>
                <div class="l">SOC</div>
            </div>`;
        }).join("");

    // ── Heating zones (auto-discover any thermostat or manual list) ──
    // Auto-discover: any device whose class contains "Thermostat" — works for
    // Insteon, Z-Wave, Nest, Ecobee, EvoHome, RAMSES, generic Indigo thermostats.
    let zoneDevices;
    if (HEATING.devices && HEATING.devices.length) {
        zoneDevices = HEATING.devices.map(([id, name]) => ({id, name, dev: byId[id]}));
    } else if (HEATING.auto_discover) {
        zoneDevices = devices
            .filter(d => /Thermostat/.test(d.class || "") && d.enabled)
            .map(d => ({id: d.id, name: d.name, dev: d}));
    } else {
        zoneDevices = [];
    }
    const zoneData = zoneDevices.map(({id, name, dev}) => {
        const temp = dev ? num(dev.temperatureInput1 || (dev.states && dev.states.temperatureInput1)) : 0;
        const sp = dev ? num(dev.setpointHeat) : 0;
        const valve = dev && dev.states ? num(dev.states["valve-position"]) : 0;
        return { id, name, temp, sp, valve, calling: valve > 0 };
    });
    const calling = zoneData.filter(z => z.calling);
    document.getElementById("callingForHeat").innerHTML = `
        <div style="text-align:center;padding:18px 8px;">
            <div style="font-size:36px;font-weight:700;color:${calling.length > 0 ? 'var(--bad)' : 'var(--good)'}">${calling.length}</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">of ${zoneData.length} zones calling for heat</div>
            ${calling.length > 0 ? `<div style="margin-top:10px;font-size:11px;color:var(--text-secondary);">${calling.map(c => c.name + " (" + c.valve + "%)").join(", ")}</div>` : '<div style="margin-top:10px;font-size:11px;color:var(--good);">✓ All valves closed</div>'}
        </div>
    `;
    makeChart("heatBars", "bar", {
        labels: zoneData.map(z => z.name),
        datasets: [
            { label: "Current °C", data: zoneData.map(z => z.temp), backgroundColor: "#ff9500", borderRadius: 4 },
            { label: "Setpoint °C", data: zoneData.map(z => z.sp), backgroundColor: "rgba(134,134,139,0.5)", borderRadius: 4 },
        ]
    }, { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { y: { beginAtZero: true, max: 25, ticks: { callback: v => v + "°" } }, x: { ticks: { font: { size: 9 } } } }, responsive: true, maintainAspectRatio: false });

    document.getElementById("zoneTiles").innerHTML = zoneData.map(z => `
        <div class="zone">
            <div class="nm">${z.name}${z.calling ? ' <span class="flame">🔥</span>' : ''}</div>
            <div class="row"><div class="tt" style="color:${z.calling ? 'var(--bad)' : 'var(--text)'}">${z.temp.toFixed(1)}°</div></div>
            <div class="sp-row">
                <div class="sp">SP <b>${z.sp.toFixed(1)}°</b>${z.valve ? ' · valve ' + z.valve + '%' : ''}</div>
                <button onclick="adjustSetpoint(${z.id}, ${z.sp}, -0.5)">−</button>
                <button onclick="adjustSetpoint(${z.id}, ${z.sp}, +0.5)">+</button>
            </div>
        </div>
    `).join("");

    // ── Gas ──
    const gasYesterday = num(getVar("gas_yesterday_kwh"));
    makeChart("gasCompare", "bar", {
        labels: ["Yesterday","Today"],
        datasets: [{ data: [gasYesterday, gasToday], backgroundColor: "#ff9500", borderRadius: 6 }]
    }, { plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => v + " kWh" } } }, responsive: true, maintainAspectRatio: false });

    makeChart("gasVsElec", "doughnut", {
        labels: ["Gas","Electricity (home)"],
        datasets: [{ data: [gasToday, homeKwh], backgroundColor: ["#ff9500","#af52de"], borderColor: cardBg, borderWidth: 3 }]
    }, { cutout: "60%", plugins: { legend: { position: "bottom", labels: { font: { size: 10 }, boxWidth: 10 } } }, responsive: true, maintainAspectRatio: false });

    const gasMonthCost = +(gasMonth * gasRate / 100).toFixed(2);
    document.getElementById("gasMonthHeader").innerHTML = `
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px;">
            <div style="font-size:28px;font-weight:700;color:var(--gas)">${gasMonth.toFixed(1)}</div>
            <div style="color:var(--text-secondary);font-size:12px;">kWh · £${gasMonthCost} @ ${gasRate.toFixed(2)}p</div>
        </div>
    `;
    const daysIn = new Date().getDate();
    makeChart("gasMonth", "line", {
        labels: Array.from({length: daysIn}, (_, i) => i+1),
        datasets: [{ data: Array.from({length: daysIn}, (_, i) => +(gasMonth * ((i+1)/daysIn)).toFixed(1)), borderColor: "#ff9500", backgroundColor: "rgba(255,149,0,0.15)", fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 }]
    }, { plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => v + " kWh" } } }, responsive: true, maintainAspectRatio: false });

    // ── Security ──
    const contacts = devices.filter(d => /contact.?sensor/i.test(d.name || ""));
    const openContacts = contacts.filter(d => d.onState === true);
    const motions = devices.filter(d => /motion|presence/i.test(d.name || "") && /sensor/i.test(d.name || ""));
    const activeMotions = motions.filter(d => d.onState === true);
    makeChart("secDonut", "doughnut", {
        labels: ["Closed","Open","Motion active","Alerts"],
        datasets: [{ data: [contacts.length - openContacts.length, openContacts.length, activeMotions.length, 0], backgroundColor: ["#34c759","#ff3b30","#ff9500","#86868b"], borderColor: cardBg, borderWidth: 3 }]
    }, { cutout: "55%", plugins: { legend: { position: "bottom", labels: { font: { size: 10 }, boxWidth: 10 } } }, responsive: true, maintainAspectRatio: false });

    document.getElementById("openContacts").innerHTML = openContacts.length === 0
        ? `<div style="text-align:center;padding:30px;color:var(--good);">✓ All ${contacts.length} contacts closed</div>`
        : openContacts.map(d => `<div class="sec-item"><span>${escapeHtml(d.name)}</span><span style="color:var(--bad)">OPEN</span></div>`).join("");
    document.getElementById("activeMotion").innerHTML =
        (activeMotions.length === 0
            ? '<div style="text-align:center;padding:20px;color:var(--text-secondary);">No motion active</div>'
            : activeMotions.map(d => `<div class="sec-item motion"><span>${escapeHtml(d.name)}</span><span style="color:var(--warn)">ACTIVE</span></div>`).join("")) +
        `<div style="margin-top:14px;padding:14px;background:rgba(52,199,89,0.1);border-radius:10px;text-align:center;">
            <div style="font-size:20px;color:var(--good);font-weight:700;">✓ No alerts</div>
            <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">No leak, smoke or CO active</div>
        </div>`;

    // ── Device inventory ──
    const counts = { lights: 0, sensors: 0, switches: 0, heating: 0, energy: 0, other: 0 };
    const pluginCounts = {};
    devices.forEach(d => {
        if (/Dimmer/.test(d.class || "")) counts.lights++;
        else if (/Thermostat/.test(d.class || "")) counts.heating++;
        else if (d.pluginId && /sigenergy|shellydirect|ecoflow|sigen/i.test(d.pluginId)) counts.energy++;
        else if (/Sensor/.test(d.class || "")) counts.sensors++;
        else if (/Relay/.test(d.class || "")) counts.switches++;
        else counts.other++;
        const p = (d.pluginId || "indigo").split(".").slice(-1)[0];
        pluginCounts[p] = (pluginCounts[p] || 0) + 1;
    });
    const devLabels = [`Lights (${counts.lights})`,`Sensors (${counts.sensors})`,`Switches (${counts.switches})`,`Heating (${counts.heating})`,`Energy (${counts.energy})`,`Other (${counts.other})`];
    const devData = [counts.lights, counts.sensors, counts.switches, counts.heating, counts.energy, counts.other];
    const devCols = ["#ff9500","#007aff","#af52de","#ff3b30","#34c759","#86868b"];
    makeChart("devicePie", "pie", { labels: devLabels, datasets: [{ data: devData, backgroundColor: devCols, borderColor: cardBg, borderWidth: 3 }] }, { plugins: { legend: { position: "bottom", labels: { font: { size: 9 }, boxWidth: 10 } } }, responsive: true, maintainAspectRatio: false });
    makeChart("devicePolar", "polarArea", { labels: devLabels, datasets: [{ data: devData, backgroundColor: devCols.map(c => c + "aa") }] }, { plugins: { legend: { position: "bottom", labels: { font: { size: 9 }, boxWidth: 10 } } }, scales: { r: { ticks: { display: false } } }, responsive: true, maintainAspectRatio: false });
    makeChart("deviceBar", "bar", { labels: devLabels, datasets: [{ data: devData, backgroundColor: devCols, borderRadius: 6 }] }, { plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 9 } } } }, responsive: true, maintainAspectRatio: false });

    const sortedPlugins = Object.entries(pluginCounts).sort((a,b) => b[1] - a[1]).slice(0, 12);
    makeChart("pluginShare", "bar", {
        labels: sortedPlugins.map(p => p[0]),
        datasets: [{ data: sortedPlugins.map(p => p[1]), backgroundColor: "#007aff", borderRadius: 4 }]
    }, { indexAxis: "y", plugins: { legend: { display: false } }, scales: { y: { ticks: { font: { size: 10 } } } }, responsive: true, maintainAspectRatio: false });

    document.getElementById("automationStats").innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center;padding:12px 0;">
            <div><div style="font-size:30px;font-weight:700;color:var(--accent)">${devices.length}</div><div style="font-size:11px;color:var(--text-secondary);">Total devices</div></div>
            <div><div style="font-size:30px;font-weight:700;color:var(--good)">${devices.filter(d => d.enabled).length}</div><div style="font-size:11px;color:var(--text-secondary);">Enabled</div></div>
            <div><div style="font-size:30px;font-weight:700;color:var(--bad)">${devices.filter(d => d.errorState && d.errorState !== "").length}</div><div style="font-size:11px;color:var(--text-secondary);">In error</div></div>
        </div>
    `;

    // ── Optimiser (only renders if OPTIMISER.deviceId is set) ──
    if (OPTIMISER.deviceId) {
        const dawnViable = getOptimiserState("dawn_viable");
        document.getElementById("optStatus").innerHTML = `
            <div class="opt-status">
                <div class="opt-action"><span class="badge">${txt(getOptimiserState("manager_status")) || 'Running'}</span>${escapeHtml(txt(getOptimiserState("current_action")))}</div>
                <div class="opt-reason">${escapeHtml(txt(getOptimiserState("current_reason")))}</div>
            </div>
            <div style="margin-top:12px;font-size:11px;color:var(--text-secondary);line-height:1.6;">
                Plan: <b style="color:var(--text)">${escapeHtml(txt(getVar("optimiser_plan")))}</b><br>
                Tariff: <b style="color:var(--text)">${txt(getOptimiserState("tariff_active"))}</b> ·
                Dawn viable: <b style="color:${dawnViable === 'True' ? 'var(--good)' : 'var(--bad)'}">${txt(dawnViable)}</b> ·
                Last: ${txt(getOptimiserState("last_update"))}
            </div>
        `;
    } else {
        document.getElementById("optStatus").innerHTML = `
            <div style="text-align:center;padding:24px;color:var(--text-secondary);font-size:13px;">
                No optimiser device configured. Set <code>OPTIMISER.deviceId</code> if you have a battery/energy manager device that publishes a current action.
            </div>
        `;
    }

    // ── System health ──
    document.getElementById("sysHealth").innerHTML = `
        <div style="text-align:center;padding:12px 0;">
            <div style="font-size:24px;font-weight:700;color:var(--accent)">${devices.length}</div>
            <div style="font-size:11px;color:var(--text-secondary);">devices polled live every ${POLL_INTERVAL_MS/1000}s</div>
        </div>
        <div style="margin-top:10px;padding:8px 10px;background:rgba(52,199,89,0.1);border-radius:8px;font-size:11px;color:var(--good);text-align:center;">
            ✓ ${devices.filter(d => !d.errorState).length} healthy · ${devices.filter(d => d.errorState && d.errorState !== "").length} errors
        </div>
    `;
}

// ── Interactive setpoint adjustment ──
async function adjustSetpoint(deviceId, current, delta) {
    const newValue = Math.round((current + delta) * 2) / 2;
    if (newValue < 5 || newValue > 30) return;
    try {
        await window._indigo.setHeatSetpoint(deviceId, newValue);
    } catch (e) {
        console.error("Setpoint change failed:", e);
        alert("Failed to change setpoint: " + e.message);
    }
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
</script>
</body>
</html>
